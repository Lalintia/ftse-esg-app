services:
  backend:
    build: ./backend
    env_file: .env.production
    restart: unless-stopped
    mem_limit: 2g
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
    env_file: .env.production
    depends_on:
      - backend
    restart: unless-stopped
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
