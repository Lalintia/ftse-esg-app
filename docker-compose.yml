services:
  backend:
    build: ./backend
    env_file: .env.production
    restart: unless-stopped
    # memswap 3g caps RAM+swap so a runaway extraction OOM-kills the
    # container instead of dragging the whole host into reclaim thrash.
    mem_limit: 2g
    memswap_limit: 3g
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
    env_file: .env.production
    depends_on:
      - backend
    restart: unless-stopped
    mem_limit: 768m
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
